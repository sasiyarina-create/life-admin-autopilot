.tag { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 14px; fill: #8A94A0; letter-spacing: 2.5px; }
</style>

<circle cx="110" cy="110" r="70" fill="#1B2A44"/>

